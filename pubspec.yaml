name: pelita
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_tts: ^4.2.5
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_text_recognition: ^0.15.1
  image: ^4.8.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  sensors_plus: ^7.0.0
  tflite_flutter: ^0.12.1
  vibration: ^3.1.8
  volume_controller: ^3.4.4
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  battery_plus: ^6.1.1
  flutter_compass: ^0.8.1
  adhan: ^2.0.0+1
  intl: ^0.20.2
  record: ^6.2.0
  audioplayers: ^6.6.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icon/
